version: '3.8'

services:
  mongo:
    image: mongo:7
    container_name: clawchat-mongo
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    networks:
      - clawchat-net

  redis:
    image: redis:7-alpine
    container_name: clawchat-redis
    restart: unless-stopped
    networks:
      - clawchat-net

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: clawchat-backend
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - HOST=0.0.0.0
      - PORT=3001
      - MONGODB_URI=mongodb://mongo:27017/clawchat
      - REDIS_URI=redis://redis:6379
      - JWT_SECRET=${JWT_SECRET:-change-me-in-production}
      - LOG_LEVEL=info
      - CLIENT_URL=${CLIENT_URL:-http://localhost}
    depends_on:
      - mongo
      - redis
    networks:
      - clawchat-net

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        - VITE_API_URL=/api
    container_name: clawchat-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - clawchat-net

volumes:
  mongo_data:

networks:
  clawchat-net:
    driver: bridge
